name: Build HWTracker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        # Network modülünü kullandığın için kurulumda olduğundan emin olalım
        modules: 'qtnetwork' 
    
    - name: Configure CMake
      # Qt yolunu otomatik tanıması için CMAKE_PREFIX_PATH ekliyoruz
      run: |
        cmake -B build -S . -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cmake --build build --config Release
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: HWTracker-Windows
        # Qt projelerinde exe genellikle build klasörünün içindeki Release klasörüne düşer
        path: build/Release/HwTracker.exe
